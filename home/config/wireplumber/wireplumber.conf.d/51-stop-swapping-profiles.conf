## In WirePlumber there's a bug where some applications trigger switching to Headset Profile.
## See issue #634, #645, #630, #629, #613.
## --
## We block that swap via `autoswitch-to-headset-profile = false` (the actual trigger), but
## still keep PipeWire registered as the HFP AG so BlueZ has a profile handler. Without it,
## bluez never speaks HFP AT commands to the headphone and `org.bluez.Battery1` is never
## populated (eg AT+IPHONEACCEV from WH-1000XM4 has nowhere to land).

wireplumber.settings = {
  ## Whether to use headset profile in the presence of an input stream.
  ## --
  ## Disable: causes glitches/profile-thrash. See note at the top.
  bluetooth.autoswitch-to-headset-profile = false
}

monitor.bluez.properties = {
  ## Enabled roles (default: [ a2dp_sink a2dp_source bap_sink bap_source hfp_hf hfp_ag ])
  ##
  ## Supported roles: hsp_hs (HSP Headset),
  ##                  hsp_ag (HSP Audio Gateway),
  ##                  hfp_hf (HFP Hands-Free),
  ##                  hfp_ag (HFP Audio Gateway)
  ##                  a2dp_sink (A2DP Audio Sink)
  ##                  a2dp_source (A2DP Audio Source)
  ##                  bap_sink (LE Audio Basic Audio Profile Sink)
  ##                  bap_source (LE Audio Basic Audio Profile Source)
  ## --
  ## Keep hsp_ag dropped: WH-1000XM3/XM4 are known to misbehave when both hsp_ag and
  ## hfp_ag are advertised (see top-of-file issues). hfp_ag alone is needed for the
  ## headphone (HF role) to do AT-command SLC with us (AG role) → battery.
  bluez5.roles = [ a2dp_sink a2dp_source hfp_ag ]
}
