# Virtual mic for routing OBS audio into other apps (Discord, Zoom, browsers).
# Setup: in OBS, Settings → Audio → Monitoring Device → "OBS Virtual Mic",
#        then per-source set Audio Monitoring to "Monitor Only" / "Monitor and Output".
# Apps then select "OBS_Virtual_Mic" as input device.
#
# Two objects:
#  1. null sink   "obs-virtual-mic"        — OBS writes here via Audio Monitoring
#  2. virtual src "obs_virtual_mic"        — exposes the sink's monitor as a regular
#                                            input source (monitors are hidden in many
#                                            apps' input pickers by default).
context.objects = [
    {   factory = adapter
        args = {
            factory.name            = support.null-audio-sink
            node.name               = "obs-virtual-mic"
            node.description        = "OBS Virtual Mic"
            media.class             = Audio/Sink
            object.linger           = true
            audio.position          = [ FL FR ]
            monitor.channel-volumes = true
        }
    }
]

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "OBS_Virtual_Mic"
            capture.props = {
                node.name           = "obs-virtual-mic.loopback-capture"
                # NB: stream.capture.sink + target.object on the SINK name is the
                # canonical recipe to capture from a specific sink's monitor.
                # `node.target = "...monitor"` alone gets overridden by the
                # auto-linker which snaps to the user's default source (real mic).
                stream.capture.sink = true
                target.object       = "obs-virtual-mic"
                stream.dont-remix   = true
            }
            playback.props = {
                node.name        = "obs_virtual_mic"
                node.description = "OBS_Virtual_Mic"
                media.class      = Audio/Source
                audio.position   = [ FL FR ]
            }
        }
    }
]
