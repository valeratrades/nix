<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>arch -- Excalidraw</title>
  <style>
    html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #save-indicator {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; padding: 4px 14px;
      border-radius: 6px; font: 13px monospace; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; z-index: 9999;
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <div id="save-indicator">saved</div>
  <script>
    var Excalidraw = ExcalidrawLib.Excalidraw;
    var excalidrawAPI = null;
    var indicator = document.getElementById('save-indicator');
    var indicatorTimer = null;

    function showIndicator(msg) {
      indicator.textContent = msg;
      indicator.style.opacity = '1';
      clearTimeout(indicatorTimer);
      indicatorTimer = setTimeout(function() { indicator.style.opacity = '0'; }, 1500);
    }

    var SAVE_APP_STATE_KEYS = [
      'gridSize', 'viewBackgroundColor', 'theme',
      'currentItemStrokeColor', 'currentItemBackgroundColor',
      'currentItemFillStyle', 'currentItemStrokeWidth',
      'currentItemStrokeStyle', 'currentItemRoughness',
      'currentItemOpacity', 'currentItemFontFamily',
      'currentItemFontSize', 'currentItemTextAlign',
      'currentItemStartArrowhead', 'currentItemEndArrowhead',
      'currentItemRoundness', 'exportBackground',
      'exportWithDarkMode', 'exportScale', 'exportEmbedScene',
      'name', 'zenModeEnabled', 'objectsSnapModeEnabled',
      'scrollX', 'scrollY', 'zoom'
    ];

    function saveNow() {
      if (!excalidrawAPI) return;
      var elements = excalidrawAPI.getSceneElements();
      var fullState = excalidrawAPI.getAppState();
      var files     = excalidrawAPI.getFiles();
      var appState = {};
      SAVE_APP_STATE_KEYS.forEach(function(k) {
        if (k in fullState) appState[k] = fullState[k];
      });
      fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'excalidraw',
          version: 2,
          source: 'http://localhost:3741',
          elements: elements,
          appState: appState,
          files: files || {}
        })
      }).then(function() {
        showIndicator('saved');
      }).catch(function() {
        showIndicator('save failed');
      });
    }

    // Step the canvas zoom by a multiplicative factor, clamped to Excalidraw's
    // own 0.1..30 bounds, keeping the viewport centered (matches the toolbar zoom).
    function stepZoom(factor) {
      if (!excalidrawAPI) return;
      var st = excalidrawAPI.getAppState();
      var cur = (st.zoom && st.zoom.value) || 1;
      var next = Math.min(30, Math.max(0.1, cur * factor));
      var cx = st.width / 2, cy = st.height / 2;
      // Anchor the zoom on the viewport center. Excalidraw maps scene->screen as
      // screen = (scene + scroll) * zoom, so scene = screen/zoom - scroll. Keep the
      // scene point under the center fixed as the zoom value changes.
      var sceneX = cx / cur - st.scrollX;
      var sceneY = cy / cur - st.scrollY;
      var scrollX = cx / next - sceneX;
      var scrollY = cy / next - sceneY;
      excalidrawAPI.updateScene({ appState: { zoom: { value: next }, scrollX: scrollX, scrollY: scrollY } });
    }

    // Pan the viewport by a fraction of its size, in scene units (so the visual
    // distance is constant regardless of zoom). Excalidraw maps scene->screen as
    // screen = (scene + scroll) * zoom, so a screen delta of d px is d/zoom in scroll.
    function panBy(dxScreen, dyScreen) {
      if (!excalidrawAPI) return;
      var st = excalidrawAPI.getAppState();
      var z = (st.zoom && st.zoom.value) || 1;
      excalidrawAPI.updateScene({ appState: {
        scrollX: st.scrollX - dxScreen / z,
        scrollY: st.scrollY - dyScreen / z
      } });
    }

    var PAN_KEYS = { ArrowLeft: [-1, 0], ArrowRight: [1, 0], ArrowUp: [0, -1], ArrowDown: [0, 1] };

    function inTextInput(t) {
      return t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    }

    document.addEventListener('keydown', function(e) {
      // Save fires from anywhere, including mid text-edit.
      if (e.altKey && e.key === 'w') {
        e.preventDefault();
        saveNow();
        return;
      }
      // The remaining bare-key bindings must not fire while editing text — let
      // the keys reach the input (cursor movement, typing literal -/=/0).
      if (inTextInput(e.target)) return;
      if (!e.ctrlKey && !e.altKey && !e.metaKey && (e.key === '-' || e.key === '_')) {
        e.preventDefault();
        stepZoom(1 / 1.1);
      } else if (!e.ctrlKey && !e.altKey && !e.metaKey && (e.key === '=' || e.key === '+')) {
        e.preventDefault();
        stepZoom(1.1);
      } else if (e.shiftKey && !e.ctrlKey && !e.altKey && !e.metaKey && (e.key === '0' || e.key === ')')) {
        // Re-anchor: scroll the content back to the viewport center, preserving
        // the current zoom level (no fit, so it won't rescale your drawing).
        e.preventDefault();
        if (excalidrawAPI) excalidrawAPI.scrollToContent(undefined, { fitToContent: false });
      } else if (PAN_KEYS[e.key] && !e.ctrlKey && !e.altKey && !e.metaKey && excalidrawAPI) {
        // Arrows pan the viewport — but only when nothing is selected, so the
        // native "nudge selected element" behavior is preserved when it matters.
        var sel = excalidrawAPI.getAppState().selectedElementIds || {};
        if (Object.keys(sel).length) return;
        e.preventDefault();
        // 80px screen step, ×4 with Shift for coarse panning.
        var step = e.shiftKey ? 320 : 80;
        var dir = PAN_KEYS[e.key];
        panBy(dir[0] * step, dir[1] * step);
      }
    });

    function sendHeartbeat() {
      fetch('/api/heartbeat', { method: 'POST' }).catch(function() {
        document.getElementById('root').style.display = 'none';
        document.body.style.background = '#1e1e1e';
        document.body.style.color = '#aaa';
        document.body.style.display = 'flex';
        document.body.style.alignItems = 'center';
        document.body.style.justifyContent = 'center';
        document.body.style.font = '24px monospace';
        document.body.textContent = 'server stopped';
      });
    }
    // Arm the server watchdog ASAP — first setInterval tick is 3s away.
    sendHeartbeat();
    setInterval(sendHeartbeat, 3000);

    fetch('/api/load')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        ReactDOM.render(
          React.createElement(Excalidraw, {
            theme: '__THEME__',
            initialData: {
              elements: data.elements || [],
              appState: Object.assign({ currentItemFontFamily: 3, currentItemOpacity: 50, currentItemStrokeWidth: 1 }, data.appState || {}, { viewBackgroundColor: '__VIEW_BG_COLOR__' }),
              files: data.files || {}
            },
            excalidrawAPI: function(api) {
              excalidrawAPI = api;
              // Force theme + canvas bg AFTER mount. initialData.appState gets
              // mangled by Excalidraw's internal restore(), so we re-assert here
              // via the public updateScene API which nothing can override.
              var post = { viewBackgroundColor: '__VIEW_BG_COLOR__', theme: '__THEME__' };
              // restore() also drops the saved viewport, so re-assert scroll/zoom
              // from the loaded file to reopen at the same place and zoom level.
              var saved = data.appState || {};
              if (typeof saved.scrollX === 'number') post.scrollX = saved.scrollX;
              if (typeof saved.scrollY === 'number') post.scrollY = saved.scrollY;
              if (saved.zoom && typeof saved.zoom.value === 'number') post.zoom = { value: saved.zoom.value };
              api.updateScene({ appState: post });
              fetch('/api/libraries')
                .then(function(r) { return r.json(); })
                .then(function(libs) {
                  if (!libs || !libs.length) return;
                  var items = [];
                  libs.forEach(function(lib) {
                    // v2 format: lib.libraryItems is array of {id, status, elements, ...}
                    if (lib.libraryItems) {
                      lib.libraryItems.forEach(function(item) { items.push(item); });
                    }
                    // v1 format: lib.library is array of element-arrays
                    if (lib.library) {
                      lib.library.forEach(function(elements, i) {
                        items.push({
                          id: lib.source + '_' + i,
                          status: 'published',
                          elements: elements,
                          created: 1
                        });
                      });
                    }
                  });
                  if (items.length) {
                    api.updateLibrary({ libraryItems: items, merge: true });
                  }
                });
            }
          }),
          document.getElementById('root')
        );
      });
  </script>
</body>
</html>
